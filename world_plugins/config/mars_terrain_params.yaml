# Mars Terrain Parameters Configuration
# All paths use ROS package relative syntax: $(find package_name)/path
# This allows the configuration to work across different systems and in Docker

# Heightmap configuration
heightmap_name: HM1.png
heightmap_path: $(find rover_gazebo)/models/mars_terrain/heightmaps_int16
heightmap_int8_path: heightmaps_int8/
texture_path: simulation_tex/

# Model and world save paths
terrain_model_save_path: $(find rover_gazebo)/models/mars_terrain
rock_model_save_path: $(find rover_gazebo)/models/mars_rocks_lbl
world_save_path: $(find rover_gazebo)/worlds
launch_file: $(find rover_gazebo)/launch/image_collect.launch

# Data files
DTM_save_path: $(find rover_gazebo)/data
DTM_save_name: simulated_terrain_data.txt

dataset_images_save_path: $(find rover_gazebo)/results/dataset

# Plugin configuration
plugin_config_file: $(find rover_gazebo_plugins)/config/TerramechanicsPluginParam.yaml

# Terrain data
terrain_data_file: $(find world_plugins)/config/terrain_data.csv
rock_list_path: $(find world_plugins)/config/rock_list.csv

# Terrain generation parameters
terrain_height: 0.1
terrain_length: 80
parameters_num: 7

heightmap_count: 7
rock_count: 35
texture_count: 4

terrain_classes: 4
param_0: 13600
param_1: 2259100
param_2: 0.92
param_3: 0.5
param_4: 462.3
param_5: 0.61
param_6: 0.014

camera_point_num: 100

terrain_class_file: $(find rover_gazebo)/data/terrain_class_simulated_terrain_data.npy
